[ai]
# Either set provider and model separately:
provider = "gemini"
model = "gemini-2.5-pro"
prompt_version = "v3"

# Or use namespaced model notation. This overrides provider.
# model = "ollama/llama3.1"
# model = "openrouter/anthropic/claude-3.5-sonnet"

# Optional overrides. Provider defaults are used when blank.
base_url = ""
api_key_env = ""

[github]
repo = "owner/repo"
cache_ttl_seconds = 600
poll_interval_seconds = 300

[cache]
enabled = true
dir = "~/.cache/lgtm"
analysis_ttl_days = 30
review_input_ttl_days = 14
max_size_mb = 2048

[ui]
# Available list columns: title, author, age, label, size
columns = ["title", "author", "age", "label"]

[review]
# Enables read-only repo-context tools for PR analysis. Set max_tool_calls = 0
# or enabled = false to use diff-only analysis.
# When cache is enabled, PR reviews use a cached detached worktree for the PR
# head SHA and fall back to repo_path if worktree preparation fails.
enabled = true
repo_path = "."
# Optional repo-specific review instructions. These are additive; lgtm still
# enforces its tool and JSON output protocol.
# system_prompt = """
# Pay extra attention to auth boundaries, sandboxing, and compatibility.
# """
# Or load the instructions from a file relative to the working directory.
# system_prompt_file = ".lgtm-review.md"
min_tool_calls = 3
max_tool_calls = 8
max_tool_output_bytes = 12000

# Provider examples:
#
# Gemini:
# [ai]
# provider = "gemini"
# model = "gemini-2.5-pro"
# api_key_env = "GEMINI_API_KEY"
#
# Ollama:
# [ai]
# provider = "ollama"
# model = "llama3.1"
# base_url = "http://localhost:11434"
#
# OpenAI:
# [ai]
# provider = "openai"
# model = "gpt-4o-mini"
# api_key_env = "OPENAI_API_KEY"
#
# OpenRouter:
# [ai]
# provider = "openrouter"
# model = "anthropic/claude-3.5-sonnet"
# api_key_env = "OPENROUTER_API_KEY"
#
# LM Studio:
# [ai]
# provider = "lmstudio"
# model = "local-model"
# base_url = "http://localhost:1234/v1"

[watch]
paths = [
  { path = "src/app/security", label = "security", color = "red" },
]
